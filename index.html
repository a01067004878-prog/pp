// =======================
// STATE
// =======================

let collection = JSON.parse(localStorage.getItem("collection")) || [];
let pity = Number(localStorage.getItem("pity")) || 0;

// =======================
// RARITY SYSTEM
// =======================

function getRarity(){
pity++;

if(pity >= 100){
pity = 0;
return "SSR";
}

let r = Math.random()*100;

if(r < 3){
pity = 0;
return "SSR";
}
if(r < 15) return "SR";
if(r < 45) return "R";
return "N";
}

// =======================
// MAKE CHARACTER
// =======================

function make(){
return jiminList[Math.floor(Math.random()*jiminList.length)];
}

// =======================
// DRAW 1
// =======================

function draw(){

const name = make();
const rarity = getRarity();

const item = {name,rarity};

if(!collection.find(x=>x.name===name)){
collection.push(item);
}

localStorage.setItem("collection",JSON.stringify(collection));
localStorage.setItem("pity",pity);

const card = document.getElementById("card");

card.className = "card "+rarity;
card.innerHTML = `
<h2>${name}</h2>
<div class="badge">${rarity}</div>
`;

if(rarity==="SSR"){
document.body.classList.add("flash");
setTimeout(()=>document.body.classList.remove("flash"),300);
}

update();
}

// =======================
// DRAW 10
// =======================

function draw10(){
for(let i=0;i<10;i++){
setTimeout(draw,i*120);
}
}

// =======================
// UPDATE UI
// =======================

function update(){
document.getElementById("count").textContent = collection.length;
document.getElementById("pity").textContent = pity;
}

// =======================
// INIT
// =======================

document.getElementById("btn1").onclick = draw;
document.getElementById("btn10").onclick = draw10;

update();
